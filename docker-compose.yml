services:
  analysis:
    build: .
    command: /app/.venv/bin/python main.py server
    environment:
      COGNITIVESENSE_SERVER_PORT: "9000"
      COGNITIVESENSE_DB_PATH: /app/data/control.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "9000:9000"
    volumes:
      - cognitivesense-data:/app/data
    restart: unless-stopped

  control:
    build: .
    command: /app/.venv/bin/uvicorn server.control.api:app --host 0.0.0.0 --port 8080
    environment:
      COGNITIVESENSE_DB_PATH: /app/data/control.db
    ports:
      - "8080:8080"
    volumes:
      - cognitivesense-data:/app/data
    restart: unless-stopped

volumes:
  cognitivesense-data:
